<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동료 평가 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f7; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const COURSES = ["BX", "CX", "DX"];
const CLASSES = [1, 2, 3];
const GROUPS = [1, 2, 3, 4, 5, 6];
const MAX_MEMBERS = 6;
const LS_KEY = "peer-eval-api-url";

// 1~6점 모두 표시 로직
function getScorePool(memberCount) {
  return [1, 2, 3, 4, 5, 6];
}

async function gasCall(baseUrl, params) {
  const url = new URL(baseUrl);
  Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, typeof v === "object" ? JSON.stringify(v) : String(v)));
  const res = await fetch(url.toString());
  return res.json();
}

function App() {
  // --- [설정값 초기화] ---
  const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzIyLbrQdMh2rvdWEoeO4BaPgBU1ioaU0ongByJQyJ0bcrKX4EUkcipuYyOwFks6EqDjw/exec";
  const DEFAULT_QUESTIONS = [
    "팀의 목표 달성을 위해 적극적으로 기여하였는가?",
    "자신의 역할을 책임감 있게 완수하였는가?",
    "팀원들과 원활하게 소통하고 협력하였는가?",
    "어려운 상황에서도 긍정적인 태도를 유지하였는가?",
    "전문성을 바탕으로 팀에 실질적인 도움을 주었는가?"
  ];
  const DEFAULT_PW = "1234";

  // --- [상태 관리] ---
  const [mode, setMode] = useState("landing");
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  
  // API 관련
  const [apiUrl, setApiUrl] = useState(DEFAULT_API_URL);
  const [apiInput, setApiInput] = useState(DEFAULT_API_URL);
  const [testStatus, setTestStatus] = useState("");

  // 관리자 설정 관련
  const [config, setConfig] = useState({
    questions: DEFAULT_QUESTIONS,
    password: DEFAULT_PW
  });
  const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
  const [adminPw, setAdminPw] = useState(DEFAULT_PW);
  const [pwInput, setPwInput] = useState("");

  // 평가 진행 관련
  const [evalName, setEvalName] = useState("");
  const [evalCourse, setEvalCourse] = useState("");
  const [evalClass, setEvalClass] = useState("");
  const [evalGroup, setEvalGroup] = useState("");
  const [members, setMembers] = useState([""]);
  const [scores, setScores] = useState({});
  const [step, setStep] = useState(1);
  const [currentQ, setCurrentQ] = useState(0);

  // 결과 조회 관련
  const [results, setResults] = useState([]);
  const [filterCourse, setFilterCourse] = useState("all");
  const [filterClass, setFilterClass] = useState("all");
  const [filterGroup, setFilterGroup] = useState("all");
  const [statsLoading, setStatsLoading] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      setApiUrl(saved);
      setApiInput(saved);
    }
    setLoading(false);
  }, []);

  // --- [함수 로직] ---
  const testConnection = async () => {
    if (!apiInput.trim()) return setTestStatus("❌ URL을 입력해주세요.");
    setTestStatus("⏳ 연결 테스트 중...");
    try {
      const data = await gasCall(apiInput.trim(), { action: "getConfig" });
      if (data.error) setTestStatus("❌ 오류: " + data.error);
      else { 
        setTestStatus("✅ 연결 성공!"); 
        if (data.config) { 
          setConfig(data.config); 
          setQuestions(data.config.questions || DEFAULT_QUESTIONS); 
          setAdminPw(data.config.password || DEFAULT_PW);
        } 
      }
    } catch { setTestStatus("❌ 연결 실패"); }
  };

  const fetchResults = async () => {
    if (!apiUrl) return;
    setStatsLoading(true);
    try { const data = await gasCall(apiUrl, { action: "getResults" }); setResults(data.results || []); }
    catch { alert("결과를 불러오지 못했습니다."); }
    setStatsLoading(false);
  };

  const handleAdminSave = async () => {
    if (!apiInput.trim()) return alert("Google Sheets API URL을 입력해주세요.");
    if (questions.some(q => !q.trim())) return alert("모든 질문을 입력해주세요.");
    if (!adminPw.trim()) return alert("관리자 비밀번호를 설정해주세요.");
    setSaving(true);
    try {
      localStorage.setItem(LS_KEY, apiInput.trim());
      setApiUrl(apiInput.trim());
      const data = await gasCall(apiInput.trim(), { action: "saveConfig", questions, password: adminPw.trim() });
      if (data.success) { 
        setConfig({ questions, password: adminPw.trim() }); 
        alert("✅ 저장 완료!"); 
        setMode("landing"); 
      }
      else alert("저장 실패: " + (data.error || ""));
    } catch (err) { alert("연결 실패: " + err.message); }
    setSaving(false);
  };

  const handleSubmit = async () => {
    setSaving(true);
    try {
      const payload = {
        evaluator: evalName,
        course: evalCourse,
        classNum: evalClass,
        group: parseInt(evalGroup),
        members: members.filter(m => m.trim()),
        scores
      };
      const data = await gasCall(apiUrl, { action: "submitEval", data: payload });
      if (data.success) setStep(5); else alert("제출 실패: " + (data.error || ""));
    } catch (err) { alert("제출 실패: " + err.message); }
    setSaving(false);
  };

  const handleClear = async () => {
    if (!confirm("모든 평가 결과를 삭제하시겠습니까?")) return;
    try { await gasCall(apiUrl, { action: "clearResults" }); setResults([]); alert("초기화 완료"); } catch (err) { alert("실패: " + err.message); }
  };

  const getUsedScores = (qi) => {
    const used = {};
    members.filter(m => m.trim()).forEach(m => {
      const key = `${m}-q${qi}`;
      if (scores[key] !== undefined && scores[key] !== null) used[scores[key]] = m;
    });
    return used;
  };

  const isQScored = (qi) => {
    const validMembers = members.filter(m => m.trim());
    return validMembers.every(m => scores[`${m}-q${qi}`] !== undefined && scores[`${m}-q${qi}`] !== null);
  };

  const getFiltered = () => results.filter(r => {
    if (filterCourse !== "all" && r.course !== filterCourse) return false;
    if (filterClass !== "all" && String(r.classNum) !== filterClass) return false;
    if (filterGroup !== "all" && String(r.group) !== filterGroup) return false;
    return true;
  });

  const getStats = () => {
    const filtered = getFiltered();
    if (!filtered.length || !config) return null;
    const ms = {};
    filtered.forEach(r => {
      const k = `${r.course}-${r.classNum}-${r.group}-${r.member}`;
      if (!ms[k]) ms[k] = { name: r.member, course: r.course, classNum: r.classNum, group: r.group, total: 0, count: 0, byQ: {}, evals: new Set() };
      r.scores.forEach((val, qi) => {
        const v = Number(val);
        if (!isNaN(v) && val !== "" && val !== null) {
          ms[k].total += v; ms[k].count++;
          if (!ms[k].byQ[qi]) ms[k].byQ[qi] = { sum: 0, n: 0 };
          ms[k].byQ[qi].sum += v; ms[k].byQ[qi].n++;
        }
      });
      ms[k].evals.add(r.evaluator);
    });
    return ms;
  };

  const resetEval = () => { setEvalName(""); setEvalCourse(""); setEvalClass(""); setEvalGroup(""); setMembers([""]); setScores({}); setStep(1); setCurrentQ(0); };

  if (loading) return <div style={S.center}><div style={S.spinner}/><p style={{color:"#888",marginTop:12}}>불러오는 중...</p></div>;

  // --- [화면 렌더링] ---
  if (mode === "landing") {
    return (
      <div style={S.page}>
        <div style={S.hero}>
          <div style={S.logoCircle}>
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <h1 style={S.heroTitle}>동료 평가 시스템</h1>
          <p style={S.heroSub}>PEER EVALUATION</p>
          {apiUrl ? <div style={S.connOk}>🟢 Google Sheets 연결됨</div> : <div style={S.connNo}>🔴 미연결</div>}
        </div>
        <div style={S.cardRow}>
          {config && apiUrl ? (
            <button style={S.mainBtn} onClick={() => { resetEval(); setMode("evaluate"); }}>
              <span style={{fontSize:24}}>✏️</span>
              <div><div style={S.btnLabel}>평가 시작하기</div><div style={S.btnDesc}>팀원에 대한 평가를 진행합니다</div></div>
            </button>
          ) : (
            <div style={S.notice}>⚠️ 평가가 설정되지 않았습니다.<br/><span style={{fontSize:12,opacity:.7}}>관리자 설정에서 Google Sheets를 연결해주세요.</span></div>
          )}
          <button style={{...S.mainBtn, background:"#f8fafc"}} onClick={() => {
            if (config && apiUrl) { setPwInput(""); setMode("adminLogin"); }
            else { setQuestions(DEFAULT_QUESTIONS); setAdminPw(DEFAULT_PW); setApiInput(apiUrl); setTestStatus(""); setMode("admin"); }
          }}>
            <span style={{fontSize:24}}>⚙️</span>
            <div><div style={S.btnLabel}>관리자 설정</div><div style={S.btnDesc}>연결 · 질문 설정 · 통계</div></div>
          </button>
        </div>
      </div>
    );
  }

  if (mode === "adminLogin") {
    return (
      <div style={S.page}><div style={S.card}>
        <h2 style={S.cardTitle}>🔒 관리자 인증</h2>
        <p style={S.cardSub}>비밀번호를 입력하세요.</p>
        <input style={S.input} type="password" placeholder="비밀번호" value={pwInput} onChange={e => setPwInput(e.target.value)} onKeyDown={e => {
          if (e.key==="Enter") { if(pwInput===config.password){setMode("adminStats");setPwInput("");fetchResults();}else alert("비밀번호가 틀렸습니다."); }
        }}/>
        <div style={S.row}>
          <button style={S.secBtn} onClick={() => setMode("landing")}>취소</button>
          <button style={S.priBtn} onClick={() => { if(pwInput===config.password){setMode("adminStats");setPwInput("");fetchResults();}else alert("비밀번호가 틀렸습니다."); }}>확인</button>
        </div>
      </div></div>
    );
  }

  if (mode === "admin") {
    return (
      <div style={S.page}><div style={{...S.card, maxWidth:480}}>
        <h2 style={S.cardTitle}>관리자 설정</h2>
        <div style={S.section}>
          <div style={S.secHead}><span>📎</span><span style={S.secLabel}>Google Sheets 연결</span></div>
          <input style={S.input} placeholder="Apps Script URL" value={apiInput} onChange={e => { setApiInput(e.target.value); setTestStatus(""); }}/>
          <div style={{display:"flex",gap:8,marginTop:8,alignItems:"center"}}>
            <button style={{...S.secBtn,fontSize:12,padding:"6px 14px"}} onClick={testConnection}>🔌 연결 테스트</button>
            {testStatus && <span style={{fontSize:12,color:testStatus.startsWith("✅")?"#16a34a":"#dc2626"}}>{testStatus}</span>}
          </div>
        </div>
        <div style={S.section}>
          <div style={S.secHead}><span>📝</span><span style={S.secLabel}>평가 질문 (5개)</span></div>
          {questions.map((q, i) => (
            <div key={i} style={S.qRow}>
              <span style={S.qBadge}>Q{i+1}</span>
              <input style={{...S.input,flex:1,margin:0}} value={q} onChange={e => { const nq=[...questions]; nq[i]=e.target.value; setQuestions(nq); }}/>
            </div>
          ))}
        </div>
        <div style={S.section}>
          <div style={S.secHead}><span>🔐</span><span style={S.secLabel}>관리자 비밀번호</span></div>
          <input style={S.input} type="password" value={adminPw} onChange={e => setAdminPw(e.target.value)}/>
        </div>
        <div style={S.row}>
          <button style={S.secBtn} onClick={() => setMode("landing")}>취소</button>
          <button style={S.priBtn} onClick={handleAdminSave} disabled={saving}>{saving?"저장 중...":"저장하기"}</button>
        </div>
      </div></div>
    );
  }

  if (mode === "adminStats") {
    const stats = getStats();
    return (
      <div style={S.page}><div style={{...S.card, maxWidth:800, width:"100%"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <h2 style={{...S.cardTitle,margin:0}}>📊 평가 결과</h2>
          <button style={{...S.secBtn,fontSize:12}} onClick={() => setMode("landing")}>홈으로</button>
        </div>
        <div style={{display:"flex",gap:8,margin:"16px 0",flexWrap:"wrap",alignItems:"center"}}>
          <select style={S.select} value={filterCourse} onChange={e => setFilterCourse(e.target.value)}>
            <option value="all">전체 과정</option>
            {COURSES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <select style={S.select} value={filterClass} onChange={e => setFilterClass(e.target.value)}>
            <option value="all">전체 반</option>
            {CLASSES.map(c => <option key={c} value={String(c)}>{c}반</option>)}
          </select>
          <select style={S.select} value={filterGroup} onChange={e => setFilterGroup(e.target.value)}>
            <option value="all">전체 조</option>
            {GROUPS.map(g => <option key={g} value={String(g)}>{g}조</option>)}
          </select>
          <button style={{...S.secBtn,fontSize:12,padding:"6px 12px"}} onClick={fetchResults}>🔄 새로고침</button>
          <button style={{...S.secBtn,fontSize:11,padding:"5px 10px",color:"#dc2626",borderColor:"#fca5a5"}} onClick={handleClear}>초기화</button>
        </div>
        {statsLoading ? (
          <div style={{textAlign:"center",padding:40}}><div style={S.spinner}/><p>데이터 로딩 중...</p></div>
        ) : !stats ? (
          <div style={{textAlign:"center",padding:40,color:"#aaa"}}>데이터가 없습니다.</div>
        ) : (
          <div style={{overflowX:"auto"}}>
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>과정/반/조</th><th style={S.th}>이름</th>
                {config.questions.map((_,i) => <th key={i} style={S.th}>Q{i+1}</th>)}
                <th style={{...S.th,color:"#2563eb"}}>평균</th>
              </tr></thead>
              <tbody>
                {Object.values(stats).map(d => (
                  <tr key={d.name}>
                    <td style={S.td}>{d.course}-{d.classNum}-{d.group}</td>
                    <td style={{...S.td,fontWeight:700}}>{d.name}</td>
                    {config.questions.map((_,qi) => <td key={qi} style={S.td}>{d.byQ[qi]?(d.byQ[qi].sum/d.byQ[qi].n).toFixed(1):"-"}</td>)}
                    <td style={S.td}><span style={{fontWeight:800,color:"#2563eb"}}>{d.count?(d.total/d.count).toFixed(1):"-"}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div></div>
    );
  }

  if (mode === "evaluate") {
    if (step === 1) return (
      <div style={S.page}><div style={S.card}>
        <StepBar c={1}/>
        <h2 style={S.cardTitle}>평가자 정보</h2>
        <label style={S.label}>이름</label>
        <input style={S.input} placeholder="본인 이름" value={evalName} onChange={e => setEvalName(e.target.value)}/>
        <label style={S.label}>과정/반/조</label>
        <div style={S.chipRow}>{COURSES.map(c => <button key={c} style={evalCourse===c?S.chipOn:S.chipOff} onClick={() => setEvalCourse(c)}>{c}</button>)}</div>
        <div style={{...S.chipRow,marginTop:8}}>{CLASSES.map(c => <button key={c} style={evalClass===String(c)?S.chipOn:S.chipOff} onClick={() => setEvalClass(String(c))}>{c}반</button>)}</div>
        <div style={{...S.chipRow,marginTop:8}}>{GROUPS.map(g => <button key={g} style={evalGroup===String(g)?S.chipOn:S.chipOff} onClick={() => setEvalGroup(String(g))}>{g}조</button>)}</div>
        <div style={S.row}>
          <button style={S.secBtn} onClick={() => setMode("landing")}>취소</button>
          <button style={S.priBtn} onClick={() => { if(evalName&&evalCourse&&evalClass&&evalGroup) setStep(2); else alert("정보를 모두 입력해주세요."); }}>다음</button>
        </div>
      </div></div>
    );
    if (step === 2) return (
      <div style={S.page}><div style={S.card}>
        <StepBar c={2}/>
        <h2 style={S.cardTitle}>평가 대상 팀원</h2>
        {members.map((m,i) => (
          <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
            <input style={{...S.input,flex:1}} placeholder={`팀원 ${i+1}`} value={m} onChange={e => { const nm=[...members]; nm[i]=e.target.value; setMembers(nm); }}/>
            {members.length>1 && <button style={S.xBtn} onClick={() => setMembers(members.filter((_,j)=>j!==i))}>✕</button>}
          </div>
        ))}
        {members.length<MAX_MEMBERS && <button style={S.addBtn} onClick={() => setMembers([...members,""])}>+ 추가</button>}
        <div style={S.row}>
          <button style={S.secBtn} onClick={() => setStep(1)}>이전</button>
          <button style={S.priBtn} onClick={() => { if(members.filter(m=>m.trim()).length) setStep(3); else alert("팀원을 입력하세요."); }}>다음</button>
        </div>
      </div></div>
    );
    if (step === 3) {
      const validMembers = members.filter(m => m.trim());
      const pool = getScorePool();
      const qi = currentQ;
      const usedScores = getUsedScores(qi);
      return (
        <div style={S.page}><div style={{...S.card, maxWidth:500}}>
          <StepBar c={3}/>
          <div style={{display:"flex",gap:4,marginBottom:16}}>{config.questions.map((_,i)=><div key={i} style={{flex:1,height:4,background:i<=qi?"#2563eb":"#e5e7eb",borderRadius:2}}/>)}</div>
          <p style={{fontSize:12,color:"#2563eb",fontWeight:700}}>질문 {qi+1}/{config.questions.length}</p>
          <p style={{fontSize:15,fontWeight:700,margin:"8px 0 20px",lineHeight:1.4}}>{config.questions[qi]}</p>
          
          {validMembers.map(m => (
            <div key={m} style={{marginBottom:15,padding:12,border:"1px solid #eee",borderRadius:12}}>
              <p style={{fontWeight:700,marginBottom:8,fontSize:14}}>{m}</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {pool.map(s => {
                  const isUsedByOther = usedScores[s] && usedScores[s] !== m;
                  const isSelected = scores[`${m}-q${qi}`] === s;
                  return (
                    <button key={s} disabled={isUsedByOther} onClick={() => {
                      const ns = {...scores};
                      if(isSelected) delete ns[`${m}-q${qi}`]; else ns[`${m}-q${qi}`] = s;
                      setScores(ns);
                    }} style={{
                      width:40,height:40,borderRadius:8,border:isSelected?"2px solid #2563eb":"1px solid #ddd",
                      background:isSelected?"#2563eb":isUsedByOther?"#f1f5f9":"#fff",
                      color:isSelected?"#fff":isUsedByOther?"#ccc":"#333",
                      fontWeight:700,cursor:isUsedByOther?"not-allowed":"pointer",position:"relative"
                    }}>
                      {s}
                      {isUsedByOther && <span style={{position:"absolute",top:-12,left:"50%",transform:"translateX(-50%)",fontSize:9,color:"#ef4444",whiteSpace:"nowrap"}}>{usedScores[s]}</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={S.row}>
            <button style={S.secBtn} onClick={() => qi===0?setStep(2):setCurrentQ(qi-1)}>이전</button>
            <button style={S.priBtn} onClick={() => {
              if(isQScored(qi)) qi===config.questions.length-1?setStep(4):setCurrentQ(qi+1);
              else alert("모든 팀원에게 중복되지 않는 점수를 부여해주세요.");
            }}>{qi===config.questions.length-1?"결과 확인":"다음 질문"}</button>
          </div>
        </div></div>
      );
    }
    if (step === 4) return (
      <div style={S.page}><div style={S.card}>
        <StepBar c={4}/>
        <h2 style={S.cardTitle}>최종 확인</h2>
        <p style={{fontSize:13,color:"#666",marginBottom:16}}>입력하신 점수가 맞는지 확인 후 제출해주세요.</p>
        {members.filter(m=>m.trim()).map(m => {
          let sum = 0;
          config.questions.forEach((_,i)=>sum+=(scores[`${m}-q${i}`]||0));
          return <div key={m} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #eee"}}>
            <span>{m}</span><span style={{fontWeight:700,color:"#2563eb"}}>{sum}점</span>
          </div>;
        })}
        <div style={S.row}>
          <button style={S.secBtn} onClick={() => setStep(3)}>수정</button>
          <button style={S.priBtn} onClick={handleSubmit} disabled={saving}>{saving?"제출 중...":"최종 제출하기"}</button>
        </div>
      </div></div>
    );
    if (step === 5) return (
      <div style={S.page}><div style={{...S.card,textAlign:"center"}}>
        <div style={{fontSize:50,marginBottom:10}}>✅</div>
        <h2 style={S.cardTitle}>제출 완료</h2>
        <p style={{color:"#666",marginTop:8}}>평가가 성공적으로 기록되었습니다.</p>
        <button style={{...S.priBtn,marginTop:20,width:"100%"}} onClick={() => {resetEval();setMode("landing");}}>처음으로</button>
      </div></div>
    );
  }
  return null;
}

function StepBar({c}) {
  return (
    <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:20}}>
      {[1,2,3,4].map(s => (
        <div key={s} style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,background:s<c?"#10b981":s===c?"#2563eb":"#e5e7eb",color:"#fff"}}>{s<c?"✓":s}</div>
      ))}
    </div>
  );
}

const S = {
  page:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20},
  center:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"},
  spinner:{width:32,height:32,border:"3px solid #e5e7eb",borderTop:"3px solid #2563eb",borderRadius:"50%",animation:"spin .8s linear infinite"},
  hero:{textAlign:"center",marginBottom:32},
  logoCircle:{width:60,height:60,borderRadius:18,background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"},
  heroTitle:{fontSize:24,fontWeight:800,color:"#111",margin:0},
  heroSub:{fontSize:11,color:"#999",letterSpacing:2,marginTop:4},
  connOk:{display:"inline-block",marginTop:10,padding:"4px 14px",borderRadius:20,background:"#f0fdf4",color:"#16a34a",fontSize:12,fontWeight:600},
  connNo:{display:"inline-block",marginTop:10,padding:"4px 14px",borderRadius:20,background:"#fef2f2",color:"#dc2626",fontSize:12,fontWeight:600},
  cardRow:{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:360},
  mainBtn:{display:"flex",alignItems:"center",gap:14,padding:"18px 20px",border:"1px solid #e2e8f0",borderRadius:14,background:"#fff",cursor:"pointer",textAlign:"left"},
  btnLabel:{fontSize:15,fontWeight:700,color:"#111"},
  btnDesc:{fontSize:11,color:"#999",marginTop:2},
  notice:{padding:20,borderRadius:12,background:"#fef3c7",color:"#92400e",textAlign:"center",fontSize:13},
  card:{width:"100%",maxWidth:440,background:"#fff",borderRadius:18,padding:"28px 24px",boxShadow:"0 2px 16px rgba(0,0,0,.06)",border:"1px solid #e5e7eb"},
  cardTitle:{fontSize:19,fontWeight:800,color:"#111"},
  cardSub:{fontSize:13,color:"#888",marginBottom:18},
  section:{marginTop:20,padding:12,background:"#fafafa",borderRadius:12,border:"1px solid #f1f5f9"},
  secHead:{display:"flex",alignItems:"center",gap:8,marginBottom:10},
  secLabel:{fontSize:14,fontWeight:700,color:"#333"},
  label:{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:6,marginTop:15},
  input:{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none"},
  select:{padding:"7px 12px",borderRadius:8,border:"1px solid #d1d5db"},
  row:{display:"flex",gap:10,alignItems:"center",justifyContent:"flex-end",marginTop:20},
  qRow:{display:"flex",gap:8,alignItems:"center",marginBottom:8},
  qBadge:{fontSize:11,fontWeight:700,color:"#fff",background:"#2563eb",borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
  priBtn:{padding:"10px 22px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#2563eb,#7c3aed)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"},
  secBtn:{padding:"9px 18px",borderRadius:10,border:"1px solid #d1d5db",background:"transparent",color:"#666",fontSize:13,cursor:"pointer"},
  addBtn:{width:"100%",padding:10,borderRadius:10,border:"1px dashed #cbd5e1",background:"transparent",color:"#2563eb",cursor:"pointer",marginTop:4},
  xBtn:{width:30,height:40,borderRadius:10,border:"1px solid #ddd",background:"#fff",color:"#ff4d4f",cursor:"pointer"},
  chipRow:{display:"flex",gap:6,flexWrap:"wrap"},
  chipOff:{padding:"6px 12px",borderRadius:8,border:"1px solid #ddd",background:"#fff",fontSize:13,cursor:"pointer"},
  chipOn:{padding:"6px 12px",borderRadius:8,border:"2px solid #2563eb",background:"#eff6ff",color:"#2563eb",fontSize:13,fontWeight:700,cursor:"pointer"},
  table:{width:"100%",borderCollapse:"collapse"},
  th:{padding:10,borderBottom:"2px solid #eee",textAlign:"left",fontSize:12,color:"#666"},
  td:{padding:10,borderBottom:"1px solid #eee",fontSize:13}
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
